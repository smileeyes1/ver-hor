<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الجمع خطوة بخطوة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #e1f5fe, #b3e5fc);
      text-align: center;
      padding: ٢٠px;
      min-height: ١٠٠vh;
      direction: rtl;
    }
    h1 { color: #d81b60; font-size: ٢.٥rem; margin: ٢٠px ٠; }
    .problem {
      font-size: ٤rem;
      background: white;
      padding: ٢٥px;
      border-radius: ١٥px;
      margin: ٣٠px auto;
      max-width: ٦٠٠px;
      box-shadow: ٠ ٥px ١٥px #ccc;
    }
    .instruction {
      font-size: ١.٨rem;
      color: #1976d2;
      margin: ٢٥px ٠;
      font-weight: bold;
    }
    input {
      font-size: ٣rem;
      width: ١٢٠px;
      text-align: center;
      border: ٤px solid #4caf50;
      border-radius: ١٢px;
      padding: ٨px;
      margin: ١٥px;
    }
    button {
      font-size: ١.٥rem;
      padding: ١٢px ٤٠px;
      margin: ١٥px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: ١٠px;
      cursor: pointer;
    }
    button:hover { background: #٣٨٨e3c; }
    #feedback {
      font-size: ٢.٢rem;
      margin: ٣٠px ٠;
      min-height: ١٠٠px;
      font-weight: bold;
      color: #٢e7d32;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <h1>يا بطل نتعلم الجمع خطوة بخطوة</h1>

  <div class="problem" id="problem"></div>

  <div class="instruction" id="step1">
    مجموع الاحاد فقط ؟<br>
    (الرقم الايمن من كل عدد)
  </div>
  <input type="number" id="onesInput" min="٠" max="١٨" autocomplete="off">

  <div>
    <button onclick="checkOnes()">التالي</button>
  </div>

  <div id="step2" class="hidden">
    <div class="instruction">
      مجموع العشرات ؟<br>
      (مع الحمل لو وجد)
    </div>
    <input type="number" id="tensInput" min="٠" max="٢٠" autocomplete="off">
    <button onclick="checkAnswer()">تأكد من الجواب</button>
  </div>

  <div id="feedback"></div>

  <script>
    // دالة لتحويل الارقام الى عربية شرقية
    function ar(n) {
      return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }

    let عدد١, عدد٢;
    let مجموع_الاحاد, مجموع_العشرات;

    function تمرين_جديد() {
      عدد١ = Math.floor(Math.random() * ٤٠) + ١٠;
      عدد٢ = Math.floor(Math.random() * ٤٠) + ١٠;

      let احد١ = عدد١ % ١٠;
      let احد٢ = عدد٢ % ١٠;
      let عشرات١ = Math.floor(عدد١ / ١٠);
      let عشرات٢ = Math.floor(عدد٢ / ١٠);

      مجموع_الاحاد = احد١ + احد٢;
      let الحمل = Math.floor(مجموع_الاحاد / ١٠);
      مجموع_العشرات = عشرات١ + عشرات٢ + الحمل;

      let عرض = document.getElementById("problem");
      عرض.innerHTML = ar(عدد١) + " + " + ar(عدد٢) + " = ؟";

      document.getElementById("onesInput").value = "";
      document.getElementById("tensInput").value = "";
      document.getElementById("step2").classList.add("hidden");
      document.getElementById("feedback").innerHTML = "";
    }

    function checkOnes() {
      let المدخل = parseInt(document.getElementById("onesInput").value);

      if (isNaN(المدخل)) {
        document.getElementById("feedback").innerHTML = "اكتب رقم يا بطل";
        return;
      }

      if (المدخل === مجموع_الاحاد) {
        document.getElementById("feedback").innerHTML = "احسنت ! الاحاد صحيحة";
        document.getElementById("step2").classList.remove("hidden");
      } else {
        document.getElementById("feedback").innerHTML =
          "مجموع الاحاد هو " + ar(مجموع_الاحاد) +
          "<br>فكر في الرقم الايمن من كل عدد فقط";
      }
    }

    function checkAnswer() {
      let المدخل = parseInt(document.getElementById("tensInput").value);

      if (isNaN(المدخل)) {
        document.getElementById("feedback").innerHTML = "اكتب رقم في خانة العشرات";
        return;
      }

      if (المدخل === مجموع_العشرات) {
        let الجواب_الكامل = مجموع_العشرات * ١٠ + (مجموع_الاحاد % ١٠);
        document.getElementById("feedback").innerHTML =
          "ممتاز جدا يا نجم 🌟<br>" +
          "الجواب الكامل هو " + ar(الجواب_الكامل);
        setTimeout(تمرين_جديد, ٤٠٠٠);
      } else {
        let الجواب_الكامل = مجموع_العشرات * ١٠ + (مجموع_الاحاد % ١٠);
        document.getElementById("feedback").innerHTML =
          "العشرات " + ar(مجموع_العشرات) +
          "<br>الجواب الكامل هو " + ar(الجواب_الكامل);
      }
    }

    // ابدأ اول تمرين
    تمرين_جديد();
  </script>
</body>
</html>
