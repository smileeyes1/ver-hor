<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الجمع خطوة بخطوة</title>
  https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #e1f5fe, #b3e5fc);
      text-align: center;
      padding: 20px;
      min-height: 100vh;
      direction: rtl;
    }

    h1 {
      color: #d81b60;
      font-size: 2.5rem;
      margin: 20px 0;
    }

    .problem {
      font-size: 4rem;
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin: 30px auto;
      max-width: 600px;
      box-shadow: 0 5px 15px #ccc;
    }

    .instruction {
      font-size: 1.8rem;
      color: #1976d2;
      margin: 25px 0;
      font-weight: bold;
    }

    input {
      font-size: 3rem;
      width: 120px;
      text-align: center;
      border: 4px solid #4caf50;
      border-radius: 12px;
      padding: 8px;
      margin: 15px;
    }

    button {
      font-size: 1.5rem;
      padding: 12px 40px;
      margin: 15px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #388e3c;
    }

    #feedback {
      font-size: 2.2rem;
      margin: 30px 0;
      min-height: 100px;
      font-weight: bold;
      color: #2e7d32;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <h1>يا بطل نتعلم الجمع خطوة بخطوة</h1>

  <div class="problem" id="problem"></div>

  <div class="instruction">
    مجموع الآحاد فقط ؟<br>
    (الرقم الأيمن من كل عدد)
  </div>

  <input type="text" id="onesInput" inputmode="numeric" autocomplete="off">

  <div>
    <button onclick="checkOnes()">التالي</button>
  </div>

  <div id="step2" class="hidden">
    <div class="instruction">
      مجموع العشرات ؟<br>
      (مع الحمل إن وجد)
    </div>

    <input type="text" id="tensInput" inputmode="numeric" autocomplete="off">
    <br>
    <button onclick="checkAnswer()">تأكد من الجواب</button>
  </div>

  <div id="feedback"></div>

  <script>
    // تحويل الأرقام إلى عربية شرقية للعرض
    function ar(n) {
      return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
    }

    // تحويل الأرقام العربية الشرقية إلى إنجليزية للحساب
    function toEnglishDigits(str) {
      return str.replace(/[٠-٩]/g, d =>
        "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]
      );
    }

    let عدد1, عدد2;
    let مجموع_الاحاد, مجموع_العشرات;

    function تمرين_جديد() {
      عدد1 = Math.floor(Math.random() * 40) + 10;
      عدد2 = Math.floor(Math.random() * 40) + 10;

      let احد1 = عدد1 % 10;
      let احد2 = عدد2 % 10;
      let عشرات1 = Math.floor(عدد1 / 10);
      let عشرات2 = Math.floor(عدد2 / 10);

      مجموع_الاحاد = احد1 + احد2;
      let الحمل = Math.floor(مجموع_الاحاد / 10);
      مجموع_العشرات = عشرات1 + عشرات2 + الحمل;

      document.getElementById("problem").innerHTML =
        ar(عدد1) + " + " + ar(عدد2) + " = ؟";

      document.getElementById("onesInput").value = "";
      document.getElementById("tensInput").value = "";
      document.getElementById("step2").classList.add("hidden");
      document.getElementById("feedback").innerHTML = "";
    }

    function checkOnes() {
      let raw = document.getElementById("onesInput").value;
      let المدخل = parseInt(toEnglishDigits(raw));

      if (isNaN(المدخل)) {
        document.getElementById("feedback").innerHTML = "اكتب رقم يا بطل";
        return;
      }

      if (المدخل === مجموع_الاحاد) {
        document.getElementById("feedback").innerHTML = "أحسنت 👏 مجموع الآحاد صحيح";
        document.getElementById("step2").classList.remove("hidden");
      } else {
        document.getElementById("feedback").innerHTML =
          "فكّر في الرقم الأيمن من كل عدد فقط";
      }
    }

    function checkAnswer() {
      let raw = document.getElementById("tensInput").value;
      let المدخل = parseInt(toEnglishDigits(raw));

      if (isNaN(المدخل)) {
        document.getElementById("feedback").innerHTML = "اكتب مجموع العشرات";
        return;
      }

      let الجواب_الكامل =
        مجموع_العشرات * 10 + (مجموع_الاحاد % 10);

      if (المدخل === مجموع_العشرات) {
        document.getElementById("feedback").innerHTML =
          "ممتاز جدًا يا نجم 🌟<br>" +
          "الجواب الكامل هو " + ar(الجواب_الكامل);

        setTimeout(تمرين_جديد, 4000);
      } else {
        document.getElementById("feedback").innerHTML =
          "راجع العشرات مع الحمل<br>" +
          "الجواب الصحيح هو " + ar(الجواب_الكامل);
      }
    }

    تمرين_جديد();
  </script>

</body>
</html>
