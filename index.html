 
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الجمع خطوة بخطوة</title>

https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap

<style>
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(#e3f2fd,#bbdefb);
  text-align:center;
  padding:20px;
}

.header{
  background:#ffffff;
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
}

.school{font-size:1.4rem;color:#1565c0;font-weight:bold;}
.teacher{font-size:1.2rem;color:#2e7d32;margin-top:5px;}

h1{color:#d81b60;font-size:2.2rem;margin:15px 0;}

.mode{
  margin:15px;
}
.mode button{
  font-size:1.2rem;
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#ff9800;
  color:white;
  cursor:pointer;
}
.mode button.active{background:#f57c00;}

.problem{
  font-size:3.5rem;
  background:white;
  padding:25px;
  border-radius:20px;
  margin:25px auto;
  width:fit-content;
}

.vertical{
  display:inline-block;
  text-align:right;
}

.instruction{
  font-size:1.6rem;
  color:#1976d2;
  margin:20px 0;
  font-weight:bold;
}

input{
  font-size:2.5rem;
  width:140px;
  text-align:center;
  border:4px solid #4caf50;
  border-radius:12px;
  padding:8px;
}

button.action{
  font-size:1.4rem;
  padding:10px 35px;
  margin:15px;
  background:#4caf50;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

#feedback{
  font-size:2rem;
  min-height:90px;
  margin-top:20px;
  font-weight:bold;
  color:#2e7d32;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
  <div class="school">مدرسة يوسف اليعقوب</div>
  <div class="teacher">المعلم: محمد وجيه محمود غنام</div>
</div>

<h1>يا بطل نتعلم الجمع خطوة بخطوة</h1>

<div class="mode">
  <button id="hBtn" class="active" onclick="setMode('h')">جمع أفقي</button>
  <button id="vBtn" onclick="setMode('v')">جمع عمودي</button>
</div>

<div class="problem" id="problem"></div>

<div class="instruction">
مجموع الآحاد فقط ؟
</div>

<input type="text" id="onesInput" inputmode="numeric">
<br>
<button class="action" onclick="checkOnes()">التالي</button>

<div id="step2" class="hidden">
  <div class="instruction">مجموع العشرات ؟</div>
  <input type="text" id="tensInput" inputmode="numeric">
  <br>
  <button class="action" onclick="checkTens()">تأكد</button>
</div>

<div id="feedback"></div>

<script>
function ar(n){
  return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);
}
function en(s){
  return s.replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);
}

let a,b,onesSum,tensSum,mode='h';

function setMode(m){
  mode=m;
  document.getElementById('hBtn').classList.toggle('active',m==='h');
  document.getElementById('vBtn').classList.toggle('active',m==='v');
  draw();
}

function newExercise(){
  a=Math.floor(Math.random()*40)+10;
  b=Math.floor(Math.random()*40)+10;

  let oa=a%10, ob=b%10;
  let ta=Math.floor(a/10), tb=Math.floor(b/10);

  onesSum=oa+ob;
  let carry=Math.floor(onesSum/10);
  tensSum=ta+tb+carry;

  document.getElementById('onesInput').value='';
  document.getElementById('tensInput').value='';
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('feedback').innerHTML='';

  draw();
}

function draw(){
  let p=document.getElementById('problem');
  if(mode==='h'){
    p.innerHTML=ar(a)+' + '+ar(b);
  }else{
    p.innerHTML=
    `<div class="vertical">
      ${ar(a)}<br>
      + ${ar(b)}<br>
      ───
    </div>`;
  }
}

function checkOnes(){
  let v=parseInt(en(onesInput.value));
  if(isNaN(v)){feedback.innerHTML='اكتب رقم';return;}
  if(v===onesSum){
    feedback.innerHTML='أحسنت ✅';
    step2.classList.remove('hidden');
  }else{
    feedback.innerHTML='راجع الرقم الأيمن فقط';
  }
}

function checkTens(){
  let v=parseInt(en(tensInput.value));
  let full=tensSum*10+(onesSum%10);
  if(v===tensSum){
    feedback.innerHTML='ممتاز 🌟<br>الجواب: '+ar(full);
    setTimeout(newExercise,4000);
  }else{
    feedback.innerHTML='حاول مرة أخرى<br>الجواب: '+ar(full);
  }
}

newExercise();
</script>

</body>
</html>
