
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الجمع السحري</title>

<style>
body{
  font-family: Tahoma, Arial;
  background: linear-gradient(#fffce8,#ffe9b5);
  text-align: center;
  padding: 20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:25px;
  max-width:720px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{ color:#b85c1e; }
h2{ color:#8b4513; }

.sum-box{
  font-size:44px;
  width:240px;
  margin:30px auto;
  position:relative;
}

.row{
  display: flex;
  justify-content: space-between;
  flex-direction: row-reverse; /* ✅ الآحاد يمين – العشرات يسار */
}
.line{
  border-top:4px solid black;
  margin:10px 0;
}

.carry{
  position:absolute;
  top:80px;
  right:80px;
  font-size:34px;
  opacity:0;
  transition:all 1s ease;
}

input{
  font-size:30px;
  padding:10px;
  width:180px;
  border-radius:12px;
  border:2px solid #4682b4;
  text-align:center;
}

button{
  font-size:26px;
  padding:14px 40px;
  margin:10px;
  border:none;
  border-radius:15px;
  background:#1e90ff;
  color:white;
  cursor:pointer;
}

button:hover{ background:#1873d1; }

#message{
  font-size:26px;
  min-height:60px;
  margin-top:15px;
  color:#006400;
}

.character{
  font-size:60px;
}
</style>
</head>

<body>

<div class="card">

<h1>🎮 لعبة الجمع السحري</h1>
<h2>المعلّم محمد وجية<br>مدرسة عاطوف المختلطة</h2>

<div class="character">👦✨</div>

<!-- الجمع العمودي فقط (لأنه التعليمي الأهم) -->
<h2>الجمع العمودي مع الحمل</h2>

<div class="sum-box">
  <div class="carry" id="carry">١</div>

  <div class="row">
    <span id="t1"></span><span id="o1"></span>
  </div>
  <div class="row">
    <span id="t2"></span><span id="o2"></span>
  </div>

  <div class="line"></div>

  <div class="row">
    <span id="tR"></span><span id="oR"></span>
  </div>
</div>

<input id="answer" placeholder="اكتب الجواب">
<br>
<button onclick="check()">تحقق ✅</button>

<div id="message"></div>

<!-- صوت طيران -->
<audio id="flySound">
  data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQQAAAAA
</audio>

</div>

<script>
let a,b;

function ar(n){
  const d=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return n.toString().split('').map(x=>d[x]).join('');
}

function newQuestion(){
  a=Math.floor(Math.random()*40)+10;
  b=Math.floor(Math.random()*40)+10;

  let aT=Math.floor(a/10), aO=a%10;
  let bT=Math.floor(b/10), bO=b%10;

  document.getElementById("t1").innerText=ar(aT);
  document.getElementById("o1").innerText=ar(aO);
  document.getElementById("t2").innerText=ar(bT);
  document.getElementById("o2").innerText=ar(bO);

  document.getElementById("tR").innerText="";
  document.getElementById("oR").innerText="";
  document.getElementById("carry").style.opacity=0;
  document.getElementById("answer").value="";

  // ✅ الخطوة الأولى (الشرح)
  document.getElementById("message").innerText =
    "🔔 نبدأ دائمًا بجمع الآحاد مع الآحاد";
}

function check(){
  let v=parseInt(document.getElementById("answer").value);
  let sum=a+b;

  if(v!==sum){
    document.getElementById("message").innerText="❌ حاول مرة أخرى";
    return;
  }

  let onesSum=(a%10)+(b%10);

  if(onesSum>=10){
    // ✅ الخطوة الثانية (الشرح + الصوت + الطيران)
    document.getElementById("message").innerText =
      "✨ المجموع أكبر من ٩ → الواحد يطير إلى العشرات ✈️";

    let c=document.getElementById("carry");
    c.style.opacity=1;
    c.style.top="20px";
    c.style.right="140px";

    document.getElementById("flySound").play();
  }

  document.getElementById("oR").innerText=ar(sum%10);
  document.getElementById("tR").innerText=ar(Math.floor(sum/10));

  setTimeout(newQuestion,2000);
}

newQuestion();
</script>

</body>
</html>
